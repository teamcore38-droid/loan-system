# Server configuration
server.port=8080
# server.servlet.context-path=/api

# Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/creditflow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Seeding
spring.sql.init.mode=always
# Spring Boot 3 properties for seeding order and script source
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# AI Verification Service URL
creditflow.ai.service.url=http://localhost:5000/api/verify

# Security Configuration
# JWT configurations
creditflow.security.jwtSecret=404E635266556A586E3272357538782F413F4428472B4B6250655368566D5970
creditflow.security.jwtExpirationMs=86400000

# Logging level
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
